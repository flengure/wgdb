name: Release

# Triggered by pushing a version tag, e.g. `git tag v0.2.0 && git push --tags`.
# Builds native binaries on all three platforms and attaches them to a GitHub
# Release that is created automatically.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # needed to create the GitHub Release and upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: wgdb
            binary: wgdb-linux-x64

          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: wgdb
            binary: wgdb-linux-arm64

          # Both macOS builds run on the ARM runner (macos-13 is deprecated).
          # Cross-compiling x86_64-apple-darwin from an ARM host works because
          # Apple ships a universal SDK and Rust supports the target natively.
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: wgdb
            binary: wgdb-macos-arm64

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: wgdb
            binary: wgdb-macos-x64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: wgdb.exe
            binary: wgdb-windows-x64.exe
            wg_arch: amd64

          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            artifact: wgdb.exe
            binary: wgdb-windows-arm64.exe
            wg_arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cache the Cargo registry and compiled deps between runs to keep
      # build times short on subsequent pushes.
      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ matrix.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      # Ad-hoc sign macOS binaries so Gatekeeper does not delete them.
      # This is not full notarization but prevents the "malware" prompt for
      # binaries that are run directly (e.g. after xattr -d com.apple.quarantine).
      - name: Sign binary (macOS)
        if: runner.os == 'macOS'
        run: codesign --sign - --force --preserve-metadata=entitlements,requirements,flags,runtime target/${{ matrix.target }}/release/${{ matrix.artifact }}

      # Unix binaries are packaged as .tar.gz to preserve the execute bit.
      # Windows binaries are uploaded as plain .exe (no equivalent needed).
      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mv target/${{ matrix.target }}/release/${{ matrix.artifact }} ${{ matrix.binary }}
          tar czf ${{ matrix.binary }}.tar.gz ${{ matrix.binary }}

      # Windows: download the matching wireguard.dll from the wireguard-nt
      # project and bundle it with the exe so users get a self-contained zip.
      # The prebuilt-binaries-license allows redistribution alongside other
      # software — the license text is included in the archive.
      - name: Bundle wireguard.dll (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          curl -fsSL https://download.wireguard.com/wireguard-nt/wireguard-nt-0.10.1.zip \
            -o wireguard-nt.zip
          unzip -j wireguard-nt.zip \
            "wireguard-nt-0.10.1/bin/${{ matrix.wg_arch }}/wireguard.dll" \
            "wireguard-nt-0.10.1/prebuilt-binaries-license.txt" \
            -d wgdist/
          mv target/${{ matrix.target }}/release/${{ matrix.artifact }} wgdist/wgdb.exe
          cd wgdist && zip ../${{ matrix.binary }}.zip wgdb.exe wireguard.dll prebuilt-binaries-license.txt

      # Unix: tar.gz preserves the execute bit.
      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mv target/${{ matrix.target }}/release/${{ matrix.artifact }} ${{ matrix.binary }}
          tar czf ${{ matrix.binary }}.tar.gz ${{ matrix.binary }}

      # Use the gh CLI (pre-installed on all GitHub runners, no Node.js
      # dependency) to create the release and upload assets.
      # Six jobs run in parallel — only one will win the creation race;
      # the others will get a "release already exists" error which we ignore.
      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            --title "${{ github.ref_name }}" \
            2>/dev/null || true
          if [ "$RUNNER_OS" = "Windows" ]; then
            gh release upload "${{ github.ref_name }}" ${{ matrix.binary }}.zip --clobber
          else
            gh release upload "${{ github.ref_name }}" ${{ matrix.binary }}.tar.gz --clobber
          fi
