name: Release

# Triggered by pushing a version tag, e.g. `git tag v0.2.0 && git push --tags`.
# Builds native binaries on all six platforms and attaches them to a GitHub
# Release that is created automatically.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # needed to create the GitHub Release and upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary: wgdb-linux-x64

          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            binary: wgdb-linux-arm64

          - os: macos-latest
            goos: darwin
            goarch: arm64
            binary: wgdb-macos-arm64

          - os: macos-latest
            goos: darwin
            goarch: amd64
            binary: wgdb-macos-x64

          - os: windows-latest
            goos: windows
            goarch: amd64
            binary: wgdb-windows-x64.exe

          - os: windows-11-arm
            goos: windows
            goarch: arm64
            binary: wgdb-windows-arm64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Build release binary
        working-directory: go
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w" -o ${{ matrix.binary }} .

      # Ad-hoc sign macOS binaries so Gatekeeper does not delete them.
      - name: Sign binary (macOS)
        if: runner.os == 'macOS'
        working-directory: go
        run: codesign --sign - --force --preserve-metadata=entitlements,requirements,flags,runtime ${{ matrix.binary }}

      # Unix binaries are packaged as .tar.gz to preserve the execute bit.
      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        working-directory: go
        run: tar czf ${{ matrix.binary }}.tar.gz ${{ matrix.binary }}

      # Windows: single self-contained .exe wrapped in a zip.
      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        working-directory: go
        shell: bash
        run: zip ${{ matrix.binary }}.zip ${{ matrix.binary }}

      - name: Upload to GitHub Release
        working-directory: go
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            --title "${{ github.ref_name }}" \
            2>/dev/null || true
          if [ "$RUNNER_OS" = "Windows" ]; then
            gh release upload "${{ github.ref_name }}" ${{ matrix.binary }}.zip --clobber
          else
            gh release upload "${{ github.ref_name }}" ${{ matrix.binary }}.tar.gz --clobber
          fi
