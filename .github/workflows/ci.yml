name: CI

# Run on every push and pull request to catch compile errors early.
# We type-check / vet on all six platforms.
on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goarch: amd64
            goos: linux

          - os: ubuntu-24.04-arm
            goarch: arm64
            goos: linux

          - os: macos-latest
            goarch: arm64
            goos: darwin

          - os: macos-latest
            goarch: amd64
            goos: darwin

          - os: windows-latest
            goarch: amd64
            goos: windows

          - os: windows-11-arm
            goarch: arm64
            goos: windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: go vet
        working-directory: go
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go vet ./...

      - name: go build
        working-directory: go
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./...
